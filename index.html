<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>recipe keeper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>recipe keeper</h1>
    <button id="newBtn" type="button">new recipe</button>
  </header>

  <main>
    <section id="listView" class="view">
      <ul id="recipeList" class="recipe-list"></ul>
      <p id="emptyMsg" class="empty">no recipes yet. hit "new recipe" to add one.</p>
    </section>

    <section id="formView" class="view hidden">
      <form id="recipeForm" class="form">
        <h2>new recipe</h2>

        <label>title
          <input name="title" required>
        </label>

        <div class="row">
          <label>servings
            <input name="servings" type="number" min="1" step="1" value="2" required>
          </label>
          <label>time (minutes)
            <input name="time" type="number" min="0" step="1" value="30">
          </label>
        </div>

        <label>tags (comma separated)
          <input name="tags" placeholder="dinner, pasta, quick">
        </label>

        <fieldset>
          <legend>ingredients</legend>
          <div id="ingredientRows"></div>
          <button type="button" id="addIngBtn" class="ghost">+ ingredient</button>
        </fieldset>

        <label>steps (one per line)
          <textarea name="steps" rows="6" required></textarea>
        </label>

        <div class="form-actions">
          <button type="submit">save</button>
          <button type="button" id="cancelBtn" class="ghost">cancel</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
